<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="tab_simulation">Simulation – Affaire CYPHERA</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/simulation.css">
</head>
<body>
    <section class="page-hero">
        <div class="video-container">
            <video id="bgVideo" autoplay muted playsinline loop>
                <source src="assets/videos/CYPHERA02.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        <div class="hero-content">
            <h1 data-i18n="nav_simulation">Simulation</h1>
            <p data-i18n="slide3_text">Incarnez un acteur clé et participez à une commission d'enquête sur 4 actes intenses.</p>
        </div>
    </section>
    <main class="container">
        <!-- Hero Simulation avec Onglets -->
        <section class="hero-simulation glass">
            <nav class="simulation-tabs">
                <button class="tab-btn active" onclick="loadActe(1)" data-i18n="sim_tab1">Acte 1</button>
                <button class="tab-btn" onclick="loadActe(2)" data-i18n="sim_tab2">Acte 2</button>
                <button class="tab-btn" onclick="loadActe(3)" data-i18n="sim_tab3">Acte 3</button>
                <button class="tab-btn" onclick="loadActe(4)" data-i18n="sim_tab4">Acte 4</button>
            </nav>
        </section>

        <!-- Tableau MINI 14 acteurs (hover -> modal) -->
        <section class="actors-mini-section glass">
            <h3 data-i18n="acte2_subtitle">14 Groupes (Survol pour détails)</h3>
            <div class="table-container">
                <table class="actors-mini-table">
                    <thead>
                        <tr>
                            <th data-i18n="rep_group">Groupe</th>
                            <th data-i18n="rep_role">Rôle</th>
                            <th data-i18n="rep_pos_acte1">Position Acte 1</th>
                        </tr>
                    </thead>
                    <tbody id="actorsMiniBody">
                        <!-- Filled by simulation.js -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Zone de contenu dynamique -->
        <section id="dynamicacte" class="dynamic-content-area">
            <div class="loading-spinner"></div>
        </section>

        <!-- 5 PDF Download Buttons -->
        <section class="pdf-downloads-section">
            <div class="download-grid">
                <button class="btn-download" onclick="generatePDF('ctx')" data-i18n="down_ctx">Contexte</button>
                <button class="btn-download" onclick="generatePDF('comm')" data-i18n="down_comm">Guide</button>
                <button class="btn-download" onclick="generatePDF('actors')" data-i18n="down_actors">Fiches</button>
                <button class="btn-download" onclick="generatePDF('eval')" data-i18n="down_eval">Grille</button>
                <button class="btn-download" onclick="generatePDF('sim')" data-i18n="down_sim">Déroulé</button>
            </div>
        </section>
    </main>

    <!-- Modal Acteurs -->
    <div id="actorModal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="i18n/translations.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/header.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/pdf-generator.js"></script>
</body>
</html>
