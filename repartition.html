<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="tab_repartition">Répartition – Affaire CYPHERA</title>
    <link rel="stylesheet" href="css/base/variables.css">
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/layout.css">
    <link rel="stylesheet" href="css/components/header.css">
    <link rel="stylesheet" href="css/components/header-nav.css">
    <link rel="stylesheet" href="css/components/header-mobile.css">
    <link rel="stylesheet" href="css/components/hero.css">
    <link rel="stylesheet" href="css/components/glass-card.css">
    <link rel="stylesheet" href="css/pages/repartition/repartition-upload.css">
    <link rel="stylesheet" href="css/pages/repartition/repartition-results.css">
</head>

<body>
    <section class="page-hero">
        <div class="video-container">
            <video id="bgVideo" autoplay muted playsinline loop>
                <source src="assets/videos/CYPHERA02.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        <div class="hero-content">
            <h1 data-i18n="nav_distribution">Répartition</h1>
        </div>
    </section>

    <main class="container">
        <section class="glass-card">
            <h2 class="accent-title premium-upload-title">📋 Importer la composition</h2>

            <div class="template-section">
                <button class="btn secondary" onclick="downloadTemplate()" data-i18n="rep_template_btn">
                    <span style="font-size: 1.2rem; margin-right: 8px;">📊</span> Télécharger le Modèle
                </button>
                <p class="help-text">Remplissez le fichier avec les noms des élèves.</p>
            </div>

            <div class="upload-section">
                <div id="drop-zone" class="glass-upload-zone" onclick="document.getElementById('csvFile').click()">
                    <div class="upload-icon-premium">🏛️</div>
                    <div class="upload-prompt-text">
                        Déposez votre fichier CSV/Excel ici<br>
                        <span style="font-size: 0.9rem; opacity: 0.7;">ou cliquez pour parcourir</span>
                    </div>
                    <button class="btn-browse-glass">Parcourir fichiers</button>
                    <input type="file" id="csvFile" accept=".csv, .xlsx, .xls" style="display: none;" onchange="handleFileSelect(event)">
                </div>

                <div id="file-info">
                    <!-- Dynamic States (Empty, Loading, Loaded) -->
                </div>

                <div id="mini-hemi-preview" class="mini-hemicycle-preview">
                    <div class="hemi-dot-container" id="hemi-dots">
                        <!-- 14 dots for detected groups -->
                    </div>
                    <div class="detected-count">
                        <span id="group-number">0</span> groupes détectés
                    </div>
                </div>
                <p class="format-hint">Format supporté : CSV uniquement (Excel converti auto)</p>
            </div>

            <div class="actions">
                <button id="distributeBtn" class="btn primary" onclick="distributeRoles()" disabled
                    data-i18n="rep_btn">Répartir les Rôles</button>
                <button id="downloadBtn" class="btn secondary" onclick="downloadCSV()" disabled
                    data-i18n="rep_download">Télécharger la Répartition</button>
            </div>

            <div class="view-switcher">
                <button class="view-btn active" data-view="table" onclick="setView('table')"
                    data-i18n="rep_view_table">Vue Tableau</button>
                <button class="view-btn" data-view="dynamic" onclick="setView('dynamic')"
                    data-i18n="rep_view_dynamic">Vue Dynamique</button>
            </div>

            <div id="resultsContainer">
                <!-- Filled by JS (Table or Dynamic view) -->
            </div>
        </section>
    </main>

    <script src="i18n/translations.js"></script>
    <script src="js/core/i18n.js"></script>
    <script src="js/components/header.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="js/core/actors-data.js"></script>
    <script src="js/modules/roles.js"></script>
    <script src="js/modules/simulation.js"></script>
</body>

</html>
